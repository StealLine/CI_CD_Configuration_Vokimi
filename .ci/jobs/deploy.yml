tag_stable_images:
  retry: 2
  stage: production
  image: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/docker:29.3.1-cli-alpine3.23
  services:
    - name: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/docker:29.3.1-dind-alpine3.23
      alias: docker
  needs:
    - job: deploy_main
      artifacts: false
  variables:
    GIT_STRATEGY: none
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: 1
  script:
    - echo "$CI_DEPENDENCY_PROXY_PASSWORD" | docker login -u "$CI_DEPENDENCY_PROXY_USER" --password-stdin $CI_DEPENDENCY_PROXY_SERVER
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - !reference [.tpl_tag_stable_images, script]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main" && $DOTNET'
      when: never
    - !reference [.skip-on-schedule, rules]
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

rollback_main:
  retry: 2

  variables:
    GIT_STRATEGY: none
    DEPLOY_DIR: $BASE_DIR_PATH/deploy
    DEPLOY_NETWORK_NAME: production_deploy
    NETWORK_NAME: main
    FRONTEND_URL: https://$DOMAIN

  stage: production
  resource_group: production
  image: alpine:3.23.3
  needs:
    - job: deploy_main
      artifacts: false
  when: manual
  manual_confirmation: "Roll back production to the previous version? The current version will be replaced!"
    # JWT keys are read from CI/CD variables at runtime — no need to duplicate them here.
  before_script:
    - !reference [.tpl_ssh_setup, script]
  script:
    - !reference [.tpl_deploy_compose_rollback, script]
    - |
      echo "=============================="
      echo " ROLLBACK complete!"
      echo " URL: $FRONTEND_URL"
      echo "=============================="
  environment:
    name: "VOKIMI DEPLOY"
    url: $FRONTEND_URL
    deployment_tier: production
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main" && $DOTNET'
      when: never
    - !reference [.skip-on-schedule, rules]
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH


